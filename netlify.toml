[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NUXT_NITRO_PRESET = "netlify"
  # Server-side function bundles legitimately contain API keys
  # that the server needs at runtime. They are NOT exposed to the browser.
  # The Nuxt Nitro bundler embeds runtimeConfig values into the server code.
  SECRETS_SCAN_ENABLED = "false"

# Nitro auto-generates cache headers for /_nuxt/* — we only add
# additional custom rules here

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

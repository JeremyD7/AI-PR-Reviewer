[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NUXT_NITRO_PRESET = "netlify"
  # Skip secret scanning in server-side function bundles — these files
  # legitimately contain API keys that the server needs at runtime.
  # They are NOT exposed to the browser.
  SECRETS_SCAN_OMIT_PATHS = ".netlify/functions-internal/*"

# Nitro auto-generates cache headers for /_nuxt/* — we only add
# additional custom rules here

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
